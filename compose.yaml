services:
  redis:
    container_name: redis
    profiles:
      - prod
      - dev
      - redis
    build: 
      context: .
      dockerfile: redis/Dockerfile
    env_file:
      .env
    ports:
      - 6379:6379
  postgres:
    container_name: postgres
    profiles:
      - prod
      - dev
    build: 
      context: .
      dockerfile: postgres/Dockerfile
    #deploy:
    #  resources:
    #    limits:
    #      memory: 512M
    env_file: 
      .env
    ports:
      - 5432:5432
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
  pgadmin4:
    container_name: pgadmin4
    profiles:
      - prod
      - dev
    build: 
      context: .
      dockerfile: pgadmin4/Dockerfile
    env_file: 
      .env
    ports:
      - 9000:80
  #mysql:
    #container_name: mysql
    #profiles:
      #- prod
      #- dev
    #build: 
      #context: .
      #dockerfile: mysql/Dockerfile
    #env_file: 
      #.env
    #ports:
      #- 3306:3306
    #volumes:
      #- ../data/mysql:/var/lib/mysql
  mariadb:
    container_name: mariadb
    profiles:
      - prod
      - dev
    build: 
      context: .
      dockerfile: mysql/Dockerfile
    env_file: 
      .env
    ports:
      - 3306:3306
    volumes:
      - ../data/mysql:/var/lib/mysql
  phpmyadmin:
    container_name: phpmyadmin
    profiles:
      - prod
      - dev
    build: 
      context: .
      dockerfile: phpmyadmin/Dockerfile
    ports:
      - 9001:80
    env_file: 
      .env
    links: 
      - mysql:db
  edb-server-mailer:
    container_name: edb-server-mailer
    profiles:
      - mailer
      - prod
      - dev
    build: 
      context: .
      dockerfile: edb-server-mailer/Dockerfile
    env_file: 
      .env
  edb-server:
    container_name: edb-server
    profiles:
      - prod
      - dev
    build: 
      context: .
      dockerfile: edb-server/Dockerfile
    # https://vsupalov.com/docker-arg-env-variable-guide/
    env_file: 
      .env
    ports:
      - 8080:8080
    volumes:
      - ../data:/data
      - ../logs:/logs
  nginx:
    container_name: nginx
    profiles:
      - prod
      - dev
    build: 
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - 80:80
